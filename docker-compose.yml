name: retailos

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-retailos}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-retailos}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks: [retailos-network]

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks: [retailos-network]

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks: [retailos-network]

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${S3_ACCESS_KEY:-minioadmin} ${S3_SECRET_KEY:-minioadmin} &&
      mc mb --ignore-existing local/${S3_BUCKET:-retailos} &&
      exit 0
      "
    networks: [retailos-network]

  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    working_dir: /app
    env_file: .env
    environment:
      HOSTNAME: "0.0.0.0"
    ports:
      - "3000:3000"
    volumes:
      - ./:/app
      - node_modules:/app/node_modules
      - next_cache:/app/.next
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    networks: [retailos-network]
    command: pnpm exec next dev -H 0.0.0.0 -p 3000

  # Phase 5 Chunk A: Python FastAPI microservice — Prophet forecasting, pure
  # stateless compute. Deliberately gets no DATABASE_URL/DATABASE_APP_URL at
  # all (see ai-engine/app/config.py) — RLS/tenant-scoping stays entirely in
  # Next.js's withTenant.
  python-ai:
    build:
      context: ./ai-engine
    env_file: .env
    environment:
      INTERNAL_TOKEN: ${INTERNAL_TOKEN:-dev-internal-token}
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks: [retailos-network]

  # Phase 5 Chunk A: BullMQ worker process — registers the forecastQueue
  # processor (src/server/queue/worker.ts). Same image/build as `app`, just a
  # different command, same "one Dockerfile, different command per role"
  # shape as the app/worker split described in PHASE5_INTELLIGENCE_PLAN.md.
  worker:
    build:
      context: .
      dockerfile: Dockerfile.dev
    working_dir: /app
    env_file: .env
    volumes:
      - ./:/app
      - node_modules:/app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      python-ai:
        condition: service_healthy
    networks: [retailos-network]
    command: pnpm exec tsx watch src/server/queue/worker.ts

  # Phase 5 Chunk A: standalone Socket.io realtime server
  # (src/server/realtime/server.ts) — Next.js's App Router can't host a
  # long-lived Socket.io server in-process, hence its own process/port.
  realtime:
    build:
      context: .
      dockerfile: Dockerfile.dev
    working_dir: /app
    env_file: .env
    ports:
      - "4001:4001"
    volumes:
      - ./:/app
      - node_modules:/app/node_modules
    depends_on:
      redis:
        condition: service_healthy
    networks: [retailos-network]
    command: pnpm exec tsx watch src/server/realtime/server.ts

networks:
  retailos-network:
    driver: bridge

volumes:
  pgdata:
  redisdata:
  miniodata:
  node_modules:
  next_cache:
