name: retailos

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-retailos}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-retailos}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks: [retailos-network]

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks: [retailos-network]

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks: [retailos-network]

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${S3_ACCESS_KEY:-minioadmin} ${S3_SECRET_KEY:-minioadmin} &&
      mc mb --ignore-existing local/${S3_BUCKET:-retailos} &&
      exit 0
      "
    networks: [retailos-network]

  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    working_dir: /app
    env_file: .env
    environment:
      HOSTNAME: "0.0.0.0"
    ports:
      - "3000:3000"
    volumes:
      - ./:/app
      - node_modules:/app/node_modules
      - next_cache:/app/.next
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    networks: [retailos-network]
    command: pnpm exec next dev --webpack -H 0.0.0.0 -p 3000

  # python-ai: not built in Phase 0 — the AI/optimization engine is a later
  # roadmap phase. Left here as a placeholder for when it's introduced.
  # python-ai:
  #   build: ./python-ai
  #   ports: ["8000:8000"]
  #   networks: [retailos-network]

networks:
  retailos-network:
    driver: bridge

volumes:
  pgdata:
  redisdata:
  miniodata:
  node_modules:
  next_cache:
